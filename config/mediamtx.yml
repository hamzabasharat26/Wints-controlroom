# MediaMTX Configuration — WINTS RTSP Video Server (v1.9.0 compatible)
# Uses runOnDemand with ffmpeg to loop MP4 test patterns.
# 10 targets × 2 cameras = 20 RTSP streams.
#
# Stream URLs: rtsp://127.0.0.1:8554/wints/<TARGET>/<CAM>
#   e.g.  rtsp://127.0.0.1:8554/wints/T-01/front

# General
logLevel: info
logDestinations: [stdout]

# RTSP
rtsp: yes
rtspAddress: :8554
protocols: [tcp]

# API (for health-checks and stream listing)
api: yes
apiAddress: :9997

# HLS / WebRTC / SRT all off to save resources
hls: no
webrtc: no
srt: no

# Paths — one entry per stream, looped via ffmpeg
paths:
  wints/T-01/front:
    runOnDemand: C:\Users\DELL LATITUDE\AppData\Local\Microsoft\WinGet\Packages\Gyan.FFmpeg_Microsoft.Winget.Source_8wekyb3d8bbwe\ffmpeg-8.1.1-full_build\bin\ffmpeg.exe -re -stream_loop -1 -i video_server/samples/target-01-front.mp4 -c copy -f rtsp rtsp://127.0.0.1:$RTSP_PORT/$RTSP_PATH
    runOnDemandRestart: yes
  wints/T-01/rear:
    runOnDemand: C:\Users\DELL LATITUDE\AppData\Local\Microsoft\WinGet\Packages\Gyan.FFmpeg_Microsoft.Winget.Source_8wekyb3d8bbwe\ffmpeg-8.1.1-full_build\bin\ffmpeg.exe -re -stream_loop -1 -i video_server/samples/target-01-rear.mp4 -c copy -f rtsp rtsp://127.0.0.1:$RTSP_PORT/$RTSP_PATH

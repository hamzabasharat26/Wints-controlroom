# Mosquitto MQTT Broker Configuration — WINTS
# Runs natively on Windows/Linux/Mac, no Docker needed

# Network
listener 1883
protocol mqtt

# Security — development mode, no auth
# For production: uncomment and configure TLS + password_file
allow_anonymous true
# password_file config/mosquitto_passwd
# cafile config/ca.crt
# certfile config/server.crt
# keyfile config/server.key

# Persistence — survive broker restarts
persistence true
persistence_location ./logs/mosquitto/
autosave_interval 60

# Logging
log_dest file logs/mosquitto/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Session
max_inflight_messages 20
max_queued_messages 1000
max_queued_bytes 0

# Connection
max_connections -1
max_keepalive 120
